<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@latest?dev",
          "react-dom/client": "https://esm.sh/react-dom@latest/client?dev",
          "react/jsx-runtime": "https://esm.sh/react@latest/jsx-runtime?dev" 
        }
      }
      
    </script>
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone@latest/babel.min.js"></script> <!--   ----(2   -->

</head>

<body>
    <div id="app"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React from 'react';
        import { createRoot } from 'react-dom/client';

        const domNode = document.getElementById('app');

        // function Header() { //  A component is a function that returns UI elements.
        // function Header(props) { // --------------(5
        // console.log(props); // { title: "React" }  --------------(5
        // console.log(props.title); // { React } --------------(5
        function Header({ title }) { // --------------(5
            console.log(title) // --------------(5
            // return <h1>Develop. Preview. Ship.</h1>;
            // return <h1>{title}</h1>;   // --------------(5 
            return <h1>{`Cool ${title}`}</h1>;   // --------------(5 template literal
        }

        function HomePage() {  // ------------(4
            return <div>
                {/* Nesting the Header component */}
                <Header title="React" /> {/* -----------(5*/}
            </div>;
        }

        function HomePage2() {    // ------------(6
            const names = ['Ada Lovelace', 'Grace Hopper', 'Margaret Hamilton'];

            return (
                <div>
                    <Header title="Develop. Preview. Ship." />
                    <ul>
                        {/* array.map() method to iterate over the array and use an arrow function to map a name to a list item*/}
                        {names.map((name) => (
                            <li key={name}>{name}</li>
                        ))}
                    </ul>
                </div>
            );
        }

        function handleClick() { // ------------(8
            console.log("increment like count")
        }

        function HomePage3() { // ------------(7
            const names = ['Ada Lovelace', 'Grace Hopper', 'Margaret Hamilton'];

            return (
                <div>
                    <Header title="Develop. Preview. Ship." />
                    <ul>
                        {names.map((name) => (
                            <li key={name}>{name}</li>
                        ))}
                    </ul>
                    <button onClick={handleClick}>Like</button> {/* ---------------(8 */}
                </div>
            );
        }
        function HomePage4() {  // ---------------------(9
            // 1. Initialize State with a starting value of 0
            const [likes, setLikes] = React.useState(0);

            // 2. Define an event handler function to update state
            function handleClick() {
                // Always use the setter function to update values so React knows to redraw the UI
                setLikes(likes + 1);
            }

            return (
                <div style={{ fontFamily: 'sans-serif', padding: '20px' }}>
                    <h1>React Interactivity Playground</h1>

                    <button onClick={handleClick} style={{ padding: '10px 20px', cursor: 'pointer' }}>
                        Likes ({likes})
                    </button>
                </div>
            );
        }

        const root = createRoot(domNode);
        // root.render(header); 
        // root.render(Header); // --------(2
        // root.render(<Header />);  // --------(3
        // root.render(<HomePage />);
        // root.render(<HomePage2 />); ---------(6
        // root.render(<HomePage3 />); // -----------(7
        root.render(<HomePage4 />); // -----------(9
    </script>
</body>

</html>
